<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PiPineapple{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  {# ---------- Title bar ---------- #}
  <header class="titlebar">
    <div class="brand">
      <span class="logo">⚡</span>
      <span class="brand-name">PiPineapple</span>
      <span class="version">v0.1.0</span>
    </div>
    <div class="titlebar-actions">
      <button class="iconbtn" title="Notifications" aria-label="Notifications">
        <span class="icon">🔔</span>
        <span class="badge-dot"></span>
      </button>
      <button class="iconbtn" title="Informational messages" aria-label="Info">
        <span class="icon">ℹ</span>
      </button>
      <button class="iconbtn" title="Web Terminal" aria-label="Web Terminal">
        <span class="icon">▶_</span>
      </button>
      <button class="iconbtn" title="More" aria-label="More">
        <span class="icon">⋮</span>
      </button>
    </div>
  </header>

  <div class="page">
    {# ---------- Left sidebar ---------- #}
    <aside class="sidebar">
      <nav class="sidenav">
        <a href="{{ url_for('dashboard.index') }}"
           class="sidenav-item {% block nav_dashboard %}{% endblock %}">
          <span class="sidenav-icon">▢</span>
          <span class="sidenav-label">Dashboard</span>
        </a>
        <a href="#" class="sidenav-item disabled"
           title="Recon — Phase B (Sessions 4–6)">
          <span class="sidenav-icon">◎</span>
          <span class="sidenav-label">Recon</span>
        </a>
        <a href="#" class="sidenav-item disabled"
           title="PineAP — Phase D (Sessions 10–13)">
          <span class="sidenav-icon">🍍</span>
          <span class="sidenav-label">PineAP</span>
        </a>
        <a href="#" class="sidenav-item disabled"
           title="Handshakes — Phase C (Sessions 7–9)">
          <span class="sidenav-icon">⇄</span>
          <span class="sidenav-label">Handshakes</span>
        </a>
        <a href="#" class="sidenav-item disabled"
           title="Campaigns — Phase E (Session 14)">
          <span class="sidenav-icon">▶</span>
          <span class="sidenav-label">Campaigns</span>
        </a>
        <a href="#" class="sidenav-item disabled"
           title="Modules — Phase F (Sessions 15–17)">
          <span class="sidenav-icon">▥</span>
          <span class="sidenav-label">Modules</span>
        </a>
        <a href="{{ url_for('learning.index') }}"
           class="sidenav-item {% block nav_learning %}{% endblock %}"
           title="Learning Centre — console commands by topic">
          <span class="sidenav-icon">📖</span>
          <span class="sidenav-label">Learning</span>
        </a>
        <a href="#" class="sidenav-item disabled"
           title="Settings — Phase G (Session 18)">
          <span class="sidenav-icon">⚙</span>
          <span class="sidenav-label">Settings</span>
        </a>
      </nav>
      <div class="sidenav-footer">
        <span class="muted">lab-only</span>
      </div>
    </aside>

    {# ---------- Main content ---------- #}
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
